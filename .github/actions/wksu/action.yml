name: Setup KernelSU
description: Download and configure official KernelSU with version tracking
inputs:
  ksu_commit:
    description: "KSU Commit"
    required: true

runs:
  using: composite
  steps:
    - name: Download KernelSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        RESOLVED_KSU_COMMIT="${{ inputs.ksu_commit }}"
        if [ -z "$RESOLVED_KSU_COMMIT" ] && [ -n "${SUSFS_KSU_COMMIT:-}" ]; then
          RESOLVED_KSU_COMMIT="$SUSFS_KSU_COMMIT"
        fi

        if [ -n "$RESOLVED_KSU_COMMIT" ]; then
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "$RESOLVED_KSU_COMMIT"
        else
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash
        fi

    - name: Enable KernelSU Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF
    
    - name: Append KernelSU exports
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        if [ -f "${{ github.workspace }}/kernel/KernelSU/kernel/export_symbol.txt" ] && \
           [ -f "${{ github.workspace }}/kernel/common/android/abi_gki_aarch64" ]; then
          awk 'NF {sub("[ \t]+$", ""); print "  " $0}' "${{ github.workspace }}/kernel/KernelSU/kernel/export_symbol.txt" \
            >> "${{ github.workspace }}/kernel/common/android/abi_gki_aarch64"
        fi

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        # Extract and export KSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV